apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sandbox-ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  rules:
  - host: sandbox.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: sandbox-api
            port:
              number: 80
