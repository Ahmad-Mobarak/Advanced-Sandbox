apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-api
  labels:
    app: sandbox-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sandbox-api
  template:
    metadata:
      labels:
        app: sandbox-api
    spec:
      containers:
      - name: api
        image: sandbox-platform/api:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: sandbox-config
        - secretRef:
            name: sandbox-secrets
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
